services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chaitra_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - backend/.env

  frontend:
    build:
      context: ./chaitra-ui
    container_name: chaitra_frontend
    ports:
      - "3000:80"

  db:
    image: postgres:15
    container_name: chaitra_db
    restart: always
    environment:
      POSTGRES_DB: chaitra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root64
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: